name: Build Bottles

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to upload release assets

jobs:
  build-bottle:
    name: Build bottle (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-14       # Apple Silicon / arm64
            bottle_tag: arm64_sonoma
          - os: macos-15       # Intel / x86_64
            bottle_tag: sequoia

    env:
      HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1
      HOMEBREW_NO_FIXUP_CHAINS: 1

    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Tap this repository
        run: brew tap ${{ github.repository_owner }}/openmemory https://github.com/${{ github.repository }}

      - name: Install qdrant dependency
        run: |
          brew install ${{ github.repository_owner }}/openmemory/qdrant

      # openmemory-mcp contains pip-installed native extensions (cryptography)
      # whose dylib IDs cannot be relocated by Homebrew. Install from source
      # without --build-bottle so Homebrew skips relocation, then bottle it.
      - name: Install openmemory-mcp (from source)
        run: |
          brew install --build-from-source ${{ github.repository_owner }}/openmemory/openmemory-mcp

      - name: Install openmemory-ui (build bottle)
        run: |
          brew install --build-bottle --overwrite ${{ github.repository_owner }}/openmemory/openmemory-ui

      - name: Bottle openmemory-mcp
        run: |
          brew bottle \
            --json \
            --root-url "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}" \
            ${{ github.repository_owner }}/openmemory/openmemory-mcp

      - name: Bottle openmemory-ui
        run: |
          brew bottle \
            --json \
            --root-url "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}" \
            ${{ github.repository_owner }}/openmemory/openmemory-ui

      - name: Upload bottles to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            *.tar.gz
            *.json
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # After both platform bottles are built and uploaded, update the formulae
  # with the correct bottle SHA256 hashes.
  update-bottle-hashes:
    name: Update formula bottle hashes
    needs: build-bottle
    runs-on: ubuntu-latest

    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download bottle JSON manifests
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ github.ref_name }}
          fileName: "*.json"
          out-file-path: bottle-json

      - name: Merge bottle JSON into formulae
        run: |
          for json_file in bottle-json/*.json; do
            brew bottle --merge --write --no-commit "${json_file}"
          done

      - name: Commit updated formulae
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update bottle hashes for ${{ github.ref_name }}"
          file_pattern: "Formula/*.rb"
